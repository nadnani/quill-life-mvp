<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quill Life | The Society</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Pinyon+Script&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Merriweather:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --bg: #FBFAF9; --ink: #111827; --mahogany: #7C2D12; --border: #E5E7EB; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--ink); scroll-behavior: smooth; }
        .serif { font-family: 'Merriweather', serif; }
        .heritage { font-family: 'Libre Baskerville', serif; }
        .cursive { font-family: 'Pinyon Script', cursive; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .sidebar-link:hover { background-color: #F3F4F6; color: var(--mahogany); }
        .active-link { background-color: #F3F4F6; color: var(--mahogany); border-right: 3px solid var(--mahogany); }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Onboarding Styles */
        .step-inactive { opacity: 0.3; filter: grayscale(1); pointer-events: none; }
    </style>
</head>
<body class="antialiased text-[18px]">

    <div id="app-root" class="flex min-h-screen">
        
        <!-- SIDEBAR -->
        <aside id="main-sidebar" class="w-64 bg-white border-r border-gray-200 hidden lg:flex flex-col sticky top-0 h-screen">
            <div class="p-8">
                <div class="flex flex-col">
                    <span class="cursive text-5xl text-[#7C2D12] leading-none">Quill</span>
                    <span class="text-[10px] font-bold uppercase tracking-[0.4em] text-gray-400 mt-1 ml-1">Life</span>
                </div>
            </div>
            
            <nav class="flex-1 px-4 space-y-1">
                <button onclick="navigate('home')" id="nav-home" class="w-full flex items-center px-4 py-3 text-sm font-semibold rounded-lg active-link">
                    <i data-lucide="layout-template" class="w-5 h-5 mr-3"></i> Home Feed
                </button>
                <button onclick="navigate('library')" id="nav-library" class="w-full flex items-center px-4 py-3 text-sm font-semibold rounded-lg sidebar-link">
                    <i data-lucide="archive" class="w-5 h-5 mr-3"></i> My Archives
                </button>
                <div class="pt-6 pb-2 px-4 text-[10px] font-bold uppercase tracking-widest text-gray-400">Growth</div>
                <button onclick="navigate('onboarding')" id="nav-onboarding" class="w-full flex items-center px-4 py-3 text-sm font-semibold rounded-lg sidebar-link">
                    <i data-lucide="plus-circle" class="w-5 h-5 mr-3"></i> Enroll Chapter
                </button>
                <button onclick="navigate('admin')" id="nav-admin" class="w-full flex items-center px-4 py-3 text-sm font-semibold rounded-lg sidebar-link">
                    <i data-lucide="shield-check" class="w-5 h-5 mr-3"></i> Admin Radar
                </button>
            </nav>

            <div class="p-4 border-t border-gray-200">
                <button onclick="navigate('editor')" class="w-full flex items-center justify-center bg-[#7C2D12] text-white py-4 rounded-xl font-bold hover:bg-[#5E220E] shadow-lg transition-all">
                    <i data-lucide="feather" class="w-5 h-5 mr-2"></i> New Entry
                </button>
            </div>
        </aside>

        <!-- MAIN WINDOW -->
        <div class="flex-1 flex flex-col">
            
            <header id="main-header" class="bg-white border-b border-gray-200 px-10 py-5 flex justify-between items-center sticky top-0 z-40">
                <div class="relative w-96">
                    <i data-lucide="search" class="absolute left-3 top-3.5 w-4 h-4 text-gray-400"></i>
                    <input type="text" placeholder="Search the archives..." class="w-full pl-10 pr-4 py-2 bg-gray-50 border-none rounded-lg text-sm outline-none">
                </div>
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 rounded-full bg-[#7C2D12] border border-gray-200 flex items-center justify-center font-bold text-white text-xs">NA</div>
                    <span class="text-sm font-bold text-gray-800">Dr. Adnani</span>
                </div>
            </header>

            <!-- VIEW: HOME (The Society Feed) -->
            <div id="view-home" class="view-content fade-in overflow-y-auto">
                <div class="max-w-3xl mx-auto py-12 px-6" id="main-feed">
                    <!-- Feed Injected -->
                </div>
            </div>

            <!-- VIEW: CHARTER ONBOARDING (B2B Tool) -->
            <div id="view-onboarding" class="view-content hidden fade-in p-12 overflow-y-auto bg-gray-50 min-h-screen">
                <div class="max-w-3xl mx-auto">
                    <header class="text-center mb-16">
                        <span class="cursive text-6xl text-[#7C2D12]">Quill</span>
                        <h2 class="serif text-4xl font-bold mt-4">Establish a Society Chapter</h2>
                        <p class="text-gray-400 font-bold uppercase text-[10px] tracking-widest mt-2">Charter Partner Enrollment</p>
                    </header>

                    <div class="space-y-8">
                        <!-- Step 1 -->
                        <div class="bg-white p-10 rounded-2xl border border-gray-200 shadow-sm">
                            <h3 class="font-bold text-xl mb-6 flex items-center gap-3">
                                <span class="w-8 h-8 rounded-full bg-[#7C2D12] text-white flex items-center justify-center text-xs">1</span>
                                Chapter Details
                            </h3>
                            <div class="grid grid-cols-2 gap-6">
                                <div class="col-span-2">
                                    <label class="text-[10px] font-bold uppercase text-gray-400 block mb-2">Facility Name</label>
                                    <input type="text" placeholder="e.g. Oakwood Manor" class="w-full p-4 bg-gray-50 border-none rounded-lg outline-none focus:ring-1 focus:ring-[#7C2D12]">
                                </div>
                                <div>
                                    <label class="text-[10px] font-bold uppercase text-gray-400 block mb-2">Chapter Location</label>
                                    <input type="text" placeholder="Brentwood, CA" class="w-full p-4 bg-gray-50 border-none rounded-lg outline-none focus:ring-1 focus:ring-[#7C2D12]">
                                </div>
                                <div>
                                    <label class="text-[10px] font-bold uppercase text-gray-400 block mb-2">Resident Capacity</label>
                                    <select class="w-full p-4 bg-gray-50 border-none rounded-lg outline-none">
                                        <option>10 - 20 Residents (Pilot)</option>
                                        <option>50+ Residents (Scale)</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <!-- Step 2 -->
                        <div class="bg-white p-10 rounded-2xl border border-gray-200 shadow-sm opacity-50">
                            <h3 class="font-bold text-xl mb-6 flex items-center gap-3">
                                <span class="w-8 h-8 rounded-full bg-gray-200 text-gray-400 flex items-center justify-center text-xs">2</span>
                                Institutional Setup
                            </h3>
                            <p class="text-sm text-gray-400">Assign your primary Activity Director and choose your first Monthly Journal theme.</p>
                        </div>

                        <button onclick="alert('Charter Invitation Sent. Your unique Chapter URL is being synthesized.')" class="w-full py-5 bg-[#7C2D12] text-white rounded-xl font-bold uppercase tracking-widest shadow-2xl hover:bg-[#5E220E] transition-all">
                            Initialize Chapter Pilot
                        </button>
                    </div>
                </div>
            </div>

            <!-- VIEW: ARCHIVES -->
            <div id="view-library" class="view-content hidden fade-in p-12">
                <div class="max-w-4xl mx-auto">
                    <h2 class="serif text-5xl font-bold mb-10">My Archives</h2>
                    <div class="bg-white p-10 border border-gray-100 rounded-xl shadow-sm border-l-4 border-l-[#7C2D12]">
                        <h4 class="serif text-3xl font-bold mb-2">The Blue Buick</h4>
                        <p class="text-[10px] font-bold uppercase text-gray-400 mb-6">Published Aug 14, 2026</p>
                        <button class="text-[#7C2D12] font-bold text-xs uppercase tracking-widest">Open Archive</button>
                    </div>
                </div>
            </div>

            <!-- REMAINING VIEWS PERSISTENT -->
            <div id="view-admin" class="view-content hidden p-12">...</div>
            <div id="view-editor" class="view-content hidden bg-white h-full">...</div>

        </div>
    </div>

    <script>
        lucide.createIcons();

        // 1. DATA
        const state = {
            stories: [
                { id: 101, author: "Arthur Chen", initials: "AC", title: "The Midnight Train to Emeryville", content: "In 1952, the fog in the East Bay didn't just sit on the water; it felt like a heavy woolen blanket. I remember the sound of the whistle, a lonely call that promised adventure elsewhere...", category: "Memoir", hearts: 14 }
            ]
        };

        // 2. RENDERING
        function renderFeed() {
            const feed = document.getElementById('main-feed');
            feed.innerHTML = state.stories.map(s => `
                <article class="bg-white border-b border-gray-100 pb-16 fade-in">
                    <div class="flex justify-between items-center mb-8">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 rounded-full bg-gray-50 flex items-center justify-center text-[#7C2D12] font-bold text-xs">${s.initials}</div>
                            <h4 class="font-bold text-base text-gray-900">${s.author}</h4>
                        </div>
                        <span class="text-[10px] font-bold uppercase tracking-widest text-[#7C2D12] px-3 py-1 bg-amber-50 rounded-full">September Edition Candidate</span>
                    </div>
                    <h2 class="serif text-4xl font-bold mb-6 leading-tight">${s.title}</h2>
                    <p class="serif text-2xl text-gray-700 leading-relaxed mb-10 opacity-90">${s.content}</p>
                    <div class="flex gap-10">
                        <button class="flex items-center text-gray-400 hover:text-red-500 font-bold transition-all"><i data-lucide="heart" class="w-6 h-6 mr-3"></i> ${s.hearts}</button>
                        <button class="flex items-center text-gray-400 hover:text-[#7C2D12] font-bold"><i data-lucide="volume-2" class="w-6 h-6 mr-3"></i> Listen</button>
                    </div>
                </article>
            `).join('');
            lucide.createIcons();
        }

        // 3. LOGIC
        function navigate(view) {
            document.querySelectorAll('.view-content').forEach(v => v.classList.add('hidden'));
            document.querySelectorAll('.sidebar-link, .active-link').forEach(l => { l.classList.remove('active-link'); l.classList.add('sidebar-link'); });
            document.getElementById('view-' + view).classList.remove('hidden');
            const btn = document.getElementById('nav-' + view);
            if (btn) { btn.classList.add('active-link'); btn.classList.remove('sidebar-link'); }
            
            if (view === 'home') renderFeed();
            window.scrollTo(0, 0);
        }

        // Init
        renderFeed();
    </script>
</body>
</html>
