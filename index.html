<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quill Life | The Society</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Pinyon+Script&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Merriweather:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --bg: #FBFAF9; --ink: #111827; --mahogany: #7C2D12; --border: #E5E7EB; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--ink); scroll-behavior: smooth; font-size: 18px; }
        .serif { font-family: 'Merriweather', serif; }
        .cursive { font-family: 'Pinyon Script', cursive; }
        .sidebar-link:hover { background-color: #F3F4F6; color: var(--mahogany); }
        .active-link { background-color: #F3F4F6; color: var(--mahogany); border-right: 3px solid var(--mahogany); }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="antialiased">

    <div id="app-root" class="flex min-h-screen">
        
        <!-- SIDEBAR -->
        <aside id="main-sidebar" class="w-64 bg-white border-r border-gray-200 hidden lg:flex flex-col sticky top-0 h-screen">
            <div class="p-8">
                <div class="flex flex-col">
                    <span class="cursive text-5xl text-[#7C2D12] leading-none">Quill</span>
                    <span class="text-[10px] font-bold uppercase tracking-[0.4em] text-gray-400 mt-1 ml-1">Life</span>
                </div>
            </div>
            <nav class="flex-1 px-4 space-y-1">
                <button onclick="navigate('home')" id="nav-home" class="w-full flex items-center px-4 py-3 text-sm font-semibold rounded-lg active-link">
                    <i data-lucide="layout-template" class="w-5 h-5 mr-3"></i> Home Feed
                </button>
                <button onclick="navigate('library')" id="nav-library" class="w-full flex items-center px-4 py-3 text-sm font-semibold rounded-lg sidebar-link">
                    <i data-lucide="archive" class="w-5 h-5 mr-3"></i> My Archives
                </button>
                <div class="pt-6 pb-2 px-4 text-[10px] font-bold uppercase tracking-widest text-gray-400">Institutional</div>
                <button onclick="navigate('admin')" id="nav-admin" class="w-full flex items-center px-4 py-3 text-sm font-semibold rounded-lg sidebar-link">
                    <i data-lucide="shield-check" class="w-5 h-5 mr-3"></i> Admin Radar
                </button>
            </nav>
            <div class="p-4 border-t border-gray-200">
                <button onclick="navigate('editor')" class="w-full flex items-center justify-center bg-[#7C2D12] text-white py-4 rounded-xl font-bold hover:bg-[#5E220E] shadow-lg transition-all">
                    <i data-lucide="feather" class="w-5 h-5 mr-2"></i> Write Entry
                </button>
            </div>
        </aside>

        <!-- MAIN WINDOW -->
        <div class="flex-1 flex flex-col">
            <header class="bg-white border-b border-gray-200 px-10 py-5 flex justify-between items-center sticky top-0 z-40">
                <div class="relative w-96">
                    <i data-lucide="search" class="absolute left-3 top-3.5 w-4 h-4 text-gray-400"></i>
                    <input type="text" placeholder="Search the Society..." class="w-full pl-10 pr-4 py-2 bg-gray-50 border-none rounded-lg text-sm outline-none">
                </div>
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 rounded-full bg-gray-100 border border-gray-200 flex items-center justify-center font-bold text-[#7C2D12]">NA</div>
                    <span class="text-sm font-bold text-gray-800">Dr. Adnani</span>
                </div>
            </header>

            <!-- VIEW: HOME (Feed with Social Spectrum) -->
            <div id="view-home" class="view-content fade-in overflow-y-auto">
                <div class="max-w-3xl mx-auto py-12 px-6">
                    <div id="main-feed" class="space-y-20">
                        <!-- Feed Injected -->
                    </div>
                </div>
            </div>

            <!-- VIEW: EDITOR -->
            <div id="view-editor" class="view-content hidden fade-in bg-white h-full">
                <div class="max-w-4xl mx-auto py-16 px-12">
                    <button onclick="navigate('home')" class="mb-10 text-gray-400 hover:text-gray-900 font-bold text-xs uppercase tracking-widest flex items-center">
                        <i data-lucide="arrow-left" class="w-4 h-4 mr-2"></i> Discard
                    </button>
                    <input type="text" id="editor-title" placeholder="Title..." class="serif w-full text-6xl font-bold border-none outline-none mb-10">
                    <textarea id="editor-body" placeholder="Start your story..." class="serif w-full h-[500px] text-2xl leading-relaxed border-none outline-none resize-none"></textarea>
                    <button onclick="publishStory()" class="bg-[#7C2D12] text-white px-10 py-4 rounded-xl font-bold uppercase text-xs tracking-widest shadow-xl fixed bottom-12 right-12">Publish to Society</button>
                </div>
            </div>

            <!-- MODAL: FORMAL LETTER -->
            <div id="letter-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-6">
                <div class="bg-[#FBFAF9] rounded-2xl w-full max-w-xl p-12 shadow-2xl border border-[#DED3C1]">
                    <h3 class="serif text-4xl font-bold mb-2">Formal Appreciation</h3>
                    <p class="text-xs text-gray-400 uppercase font-bold mb-8">This letter will be archived in the author's private postbox.</p>
                    <textarea id="letter-content" placeholder="Write a thoughtful note..." class="w-full h-64 p-6 bg-white border border-[#E5E7EB] rounded-xl text-xl serif outline-none focus:ring-1 focus:ring-[#7C2D12] mb-8"></textarea>
                    <div class="flex gap-6">
                        <button onclick="submitLetter()" class="flex-1 bg-[#7C2D12] text-white py-4 rounded-xl font-bold uppercase text-xs tracking-widest">Send Formal Letter</button>
                        <button onclick="closeLetterModal()" class="px-8 py-4 text-gray-400 font-bold uppercase text-xs tracking-widest">Cancel</button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        lucide.createIcons();

        // 1. DATA
        const state = {
            stories: [
                { 
                    id: 101, 
                    author: "Arthur Chen", 
                    initials: "AC", 
                    title: "The Midnight Train to Emeryville", 
                    content: "In 1952, the fog in the East Bay didn't just sit on the water; it felt like a heavy woolen blanket...", 
                    hearts: 14,
                    comments: [
                        { user: "Martha G.", text: "This brings back such memories, Arthur!", time: "1h ago" }
                    ]
                }
            ]
        };

        // 2. RENDERING
        function renderFeed() {
            const feed = document.getElementById('main-feed');
            feed.innerHTML = state.stories.map(s => `
                <article class="bg-white border-b border-gray-100 pb-16 fade-in">
                    <div class="flex justify-between items-center mb-8">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 rounded-full bg-gray-50 flex items-center justify-center text-[#7C2D12] font-bold text-xs">${s.initials}</div>
                            <h4 class="font-bold text-base text-gray-900">${s.author}</h4>
                        </div>
                    </div>
                    <h2 class="serif text-4xl font-bold mb-6 leading-tight">${s.title}</h2>
                    <p class="serif text-2xl text-gray-700 leading-relaxed mb-10 opacity-90">${s.content}</p>
                    
                    <!-- THE SOCIAL SPECTRUM BAR -->
                    <div class="flex flex-col gap-6 border-t border-gray-50 pt-8">
                        <div class="flex items-center gap-10">
                            <button class="flex items-center text-red-500 font-bold text-sm"><i data-lucide="heart" class="w-5 h-5 mr-2"></i> ${s.hearts}</button>
                            <button class="flex items-center text-gray-400 font-bold text-sm hover:text-[#7C2D12]"><i data-lucide="message-circle" class="w-5 h-5 mr-2"></i> Comment</button>
                            <button onclick="openLetterModal('${s.author}')" class="flex items-center text-[#7C2D12] font-bold text-xs uppercase tracking-widest border border-[#7C2D12] px-4 py-1.5 rounded hover:bg-[#7C2D12] hover:text-white transition-all">
                                <i data-lucide="pen-tool" class="w-4 h-4 mr-2"></i> Send Letter
                            </button>
                        </div>

                        <!-- INFORMAL COMMENTS SECTION -->
                        <div class="space-y-4">
                            ${s.comments.map(c => `
                                <div class="flex gap-3 bg-gray-50 p-4 rounded-xl">
                                    <p class="text-sm"><strong>${c.user}:</strong> ${c.text} <span class="text-[10px] text-gray-400 ml-2 uppercase font-bold">${c.time}</span></p>
                                </div>
                            `).join('')}
                            <div class="flex gap-3">
                                <input type="text" placeholder="Write a quick comment..." class="flex-1 bg-white border border-gray-200 rounded-lg px-4 py-2 text-sm outline-none focus:ring-1 focus:ring-[#7C2D12]">
                                <button class="text-[#7C2D12] font-bold text-xs uppercase tracking-widest">Post</button>
                            </div>
                        </div>
                    </div>
                </article>
            `).join('');
            lucide.createIcons();
        }

        // 3. ACTIONS
        function navigate(view) {
            document.querySelectorAll('.view-content').forEach(v => v.classList.add('hidden'));
            document.querySelectorAll('.sidebar-link, .active-link').forEach(l => { l.classList.remove('active-link'); l.classList.add('sidebar-link'); });
            document.getElementById('view-' + view).classList.remove('hidden');
            const btn = document.getElementById('nav-' + view);
            if (btn) { btn.classList.add('active-link'); btn.classList.remove('sidebar-link'); }
            if (view === 'home') renderFeed();
            window.scrollTo(0, 0);
        }

        function openLetterModal(author) {
            document.getElementById('letter-modal').classList.remove('hidden');
        }

        function closeLetterModal() {
            document.getElementById('letter-modal').classList.add('hidden');
        }

        function submitLetter() {
            alert("A formal letter has been sent. This will be preserved in the author's archives.");
            closeLetterModal();
        }

        function publishStory() {
            const title = document.getElementById('editor-title').value;
            const body = document.getElementById('editor-body').value;
            if(!title || !body) return;
            state.stories.unshift({ id: Date.now(), author: "Dr. Adnani", initials: "NA", title, content: body, hearts: 0, comments: [] });
            navigate('home');
        }

        // Init
        renderFeed();
    </script>
</body>
</html>
